name: Build v2

on:
  push:
    branches: [main, v2]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'web/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Copy frontend assets
        run: |
          rm -rf internal/embed/static/*
          cp -r web/build/* internal/embed/static/

      - name: Build Go binary
        run: |
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${{ github.sha }}" -o bin/flowcase ./cmd/flowcase

      - name: Run tests
        run: go test ./... -v -count=1

      - uses: actions/upload-artifact@v4
        with:
          name: flowcase-binary
          path: bin/flowcase

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v2'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: v2.Dockerfile
          push: true
          tags: flowcaseweb/flowcase:v2-${{ github.sha }}
          platforms: linux/amd64,linux/arm64
