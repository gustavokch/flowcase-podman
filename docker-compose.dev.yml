services:
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: quay.io/gustavokch/flowcase:develop
    container_name: flowcase-web-dev
    restart: unless-stopped
    volumes:
      - .:/flowcase
      - flowcase-data:/flowcase/data
      - flowcase-nginx-data:/flowcase/nginx
      # Rootful Podman's Docker-compatible API socket
      - /run/podman/podman.sock:/run/podman/podman.sock
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=1
      - DOCKER_HOST=unix:///run/podman/podman.sock
      - FLOWCASE_IMAGE_REGISTRY=${FLOWCASE_IMAGE_REGISTRY:-}
    ports:
      - "5000"
    networks:
      - default_network
    command: python run.py --debug

  nginx:
    image: nginx:1.28-alpine
    container_name: flowcase-nginx
    restart: unless-stopped
    volumes:
      - flowcase-nginx-data:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - default_network

networks:
  default_network:
    driver: bridge

volumes:
  flowcase-data:
    external: false
  flowcase-nginx-data:
    external: false