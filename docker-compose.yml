
---
# Traefik + Authentik bypassed: nginx published directly on the Tailscale
# interface (no HTTPS / Let's Encrypt provisioning).
# include:
#  - docker-compose-traefik.yml
#  - docker-compose-authentik.yml

services:
  web:
    build:
      context: .
      dockerfile: web.Dockerfile
    image: flowcaseweb/flowcase
    container_name: flowcase-web
    restart: unless-stopped
    volumes:
      - flowcase-data:/flowcase/data
      - flowcase-nginx-data:/flowcase/nginx
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=0
      - FLOWCASE_DOCKER_USERNAME=${FLOWCASE_DOCKER_USERNAME:-}
      - FLOWCASE_DOCKER_PASSWORD=${FLOWCASE_DOCKER_PASSWORD:-}
      - FLOWCASE_DOCKER_REGISTRY=${FLOWCASE_DOCKER_REGISTRY:-}
    networks:
      - default_network
    command: python run.py # --traefik-authentik # --registry-lock https://my-private-locked-registry.example

  nginx:
    image: nginx:1.28-alpine
    container_name: flowcase-nginx
    restart: unless-stopped
    volumes:
      - flowcase-nginx-data:/etc/nginx/conf.d
    # Listen on port 5544 of the Tailscale interface IP only (no HTTPS).
    ports:
      - "${TS_IP}:5544:80"
    depends_on:
      - web
    networks:
      - default_network

networks:
  default_network:
    driver: bridge

volumes:
  flowcase-data:
    external: false
  flowcase-nginx-data:
    external: false
